<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$ynce</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            radial-gradient(circle at bottom,
            rgba(70,0,0,0.12),
            transparent 50%),
            #000;

            color:white;

            font-family:'Courier New', monospace;

            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;

            min-height:100vh;

            overflow:hidden;
        }

        /* TITLE */

        h1{
            font-size:48px;

            margin-bottom:50px;

            text-transform:uppercase;

            letter-spacing:6px;

            color:white;

            text-shadow:
            0 0 8px rgba(255,0,0,0.35),
            0 0 20px rgba(255,0,0,0.18);
        }

        /* BUTTON HOLDER */

        .button-container{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        /* BUTTONS */

        .glow-button{

            position:relative;

            padding:16px 40px;

            font-size:20px;
            font-weight:900;

            text-transform:uppercase;

            letter-spacing:2px;

            color:white;

            background:rgba(8,8,8,0.88);

            border:1px solid rgba(255,60,60,0.18);

            border-radius:14px;

            text-decoration:none;

            text-align:center;

            width:320px;

            overflow:hidden;

            transition:
            transform .22s ease,
            background .22s ease,
            box-shadow .22s ease,
            border .22s ease;

            box-shadow:
            0 0 6px rgba(255,255,255,0.02),
            0 8px 18px rgba(120,0,0,0.12);
        }

        /* SMALL RED UNDERGLOW */

        .glow-button::after{

            content:'';

            position:absolute;

            left:20%;
            bottom:-6px;

            width:60%;
            height:10px;

            background:rgba(255,40,40,0.28);

            filter:blur(12px);

            opacity:0.55;

            z-index:-1;

            transition:.25s ease;
        }

        /* BUTTON HOVER */

        .glow-button:hover{

            transform:translateY(-2px);

            background:rgba(20,0,0,0.92);

            border:1px solid rgba(255,70,70,0.20);

            color:#fff;

            box-shadow:
            0 0 10px rgba(255,255,255,0.03),
            0 10px 22px rgba(120,0,0,0.16);

            text-shadow:
            0 0 6px rgba(255,255,255,0.10);
        }

        .glow-button:hover::after{

            opacity:0.82;

            filter:blur(14px);

            background:rgba(255,50,50,0.32);
        }

        /* BACKGROUND AMBIENT GLOW */

        body::before{

            content:'';

            position:fixed;

            bottom:-220px;
            left:50%;

            transform:translateX(-50%);

            width:900px;
            height:500px;

            background:radial-gradient(circle,
            rgba(120,0,0,0.16) 0%,
            rgba(120,0,0,0.06) 35%,
            transparent 70%);

            filter:blur(80px);

            pointer-events:none;

            z-index:-2;
        }

    </style>

</head>

<body>

    <h1>$YNCE</h1>

    <div class="button-container">

        <a href="dasherafn.html" class="glow-button">
            Dashers Dox
        </a>

        <a href="Techgangster.html" class="glow-button">
            Techgangsters Dox
        </a>

        <a href="Ageplayr.html" class="glow-button">
            E-hoe/ageplayer
        </a>

        <a href="recmil.html" class="glow-button">
            Recmill
        </a>

        <a href="#" class="glow-button">
            DOX ARCHIVE
        </a>

    </div>

    <!-- AUDIO -->

    <audio id="bgAudio" autoplay loop>

        <source src="https://codehs.com/uploads/953f7bc0b332440505eb59d646f37189" type="audio/mpeg">

        Your browser does not support the audio element.

    </audio>

    <script>

        const audio = document.getElementById('bgAudio');

        window.addEventListener('load', () => {

            audio.volume = 0.6;

            const playPromise = audio.play();

            if (playPromise !== undefined) {

                playPromise.catch(() => {

                    console.log("Autoplay prevented.");

                    document.querySelectorAll('.glow-button').forEach(btn => {

                        btn.addEventListener('click', () => {

                            audio.play().catch(() => {});

                        }, { once: true });

                    });

                });

            }

        });

    </script>

</body>
</html>
