
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSINT User Search Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .results {
      margin-top: 20px;
    }

    .result {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 10px;
      border-left: 5px solid #007BFF;
      border-radius: 5px;
    }

    .result a {
      color: #007BFF;
      text-decoration: none;
    }

    .result a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OSINT User Search Tool</h1>
    <input type="text" id="usernameInput" placeholder="Enter a username..." />
    <button onclick="searchUsernames()">Search</button>
    <div class="results" id="results"></div>
  </div>

  <script>
    function searchUsernames() {
      const username = document.getElementById("usernameInput").value.trim();
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      if (!username) {
        resultsDiv.innerHTML = "<p>Please enter a username.</p>";
        return;
      }

      const platforms = [
        `https://twitter.com/${username}`,
        `https://www.instagram.com/${username}/`,
        `https://www.tiktok.com/@${username}/`,
        `https://www.linkedin.com/in/${username}/`,
        `https://github.com/${username}`,
        `https://www.reddit.com/user/${username}/`
      ];

      resultsDiv.innerHTML = "<p>Loading...</p>";

      platforms.forEach((url) => {
        fetch(url)
          .then((response) => {
            if (response.ok) {
              return response.text();
            } else {
              return Promise.resolve(null);
            }
          })
          .then((html) => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const title = doc.title || "No title found";
            const link = url;

            const resultDiv = document.createElement("div");
            resultDiv.className = "result";
            resultDiv.innerHTML = `<strong><a href="${link}" target="_blank">${title}</a></strong>`;
            resultsDiv.appendChild(resultDiv);
          })
          .catch((error) => {
            console.error("Error fetching:", error);
          });
      });
    }
  </script>
</body>
</html>
